version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # rest api
      - "6334:6334" # web api
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    # healthcheck:
    restart: unless-stopped
    networks:
      - chatbot_network
networks:
  chatbot_network:
    driver: bridge
